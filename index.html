<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#0d1117);
    background-size:400% 400%;

    animation:bg 12s ease infinite;
}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:420px;
padding:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

box-shadow:0 10px 40px rgba(0,0,0,.5);

text-align:center;

color:white;

}

.profile{

width:120px;
height:120px;

margin:auto;

border-radius:50%;

background:#58a6ff;

display:flex;

align-items:center;

justify-content:center;

font-size:45px;

font-weight:bold;

margin-bottom:20px;

}

h1{

font-size:32px;

margin-bottom:8px;

}

p{

color:#ddd;

margin-bottom:25px;

}

h3{

margin-top:20px;

margin-bottom:15px;

}

.btn{

display:block;

margin:12px 0;

padding:14px;

text-decoration:none;

font-weight:600;

color:white;

border-radius:50px;

transition:.3s;

}

.linkedin{
background:#0077b5;
}

.github{
background:#24292e;
}

.codechef{
background:#5B4638;
}

.leetcode{
background:#FFA116;
color:black;
}

.btn:hover{

transform:translateY(-5px);

box-shadow:0 8px 20px rgba(0,0,0,.4);

}

.skills{

margin-top:20px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:10px;

}

.skills span{

background:#58a6ff;

padding:8px 15px;

border-radius:30px;

font-size:14px;

}

footer{

margin-top:25px;

font-size:14px;

color:#bbb;

}

</style>

</head>
